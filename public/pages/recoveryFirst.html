<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamUp</title>
    <link rel="stylesheet" href="../styles/loginRegistration.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">TeamUP</h1>
        <h2 class="title">Восстановление пароля</h2>
        <form id="recoveryFirst">
            <label>Ваш email:</label>
            <input type="email" id="email" placeholder="Введите email" />
            
            <button type="submit" class="btn email" id="emailBtn">Отправить код:</button>
            
            <label>Код подтверждения:</label>
            <input type="text" id="code" required placeholder="" disabled/>
            
            <button type="submit" class="btn code" id="codeBtn" disabled>Подтвердить</button>
        </form>
        <div class="links">
        <a href="../pages/login.html">Вход</a>
        </div>
    </div>
</body>
<script src="../scripts/recovery.js"></script>
</html>
