<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TeamUp</title>
<link rel="stylesheet" href="../styles/loginRegistration.css">
</head>

<body>

<div class="container">

    <h1 class="logo">TeamUP</h1>
    <h2 class="title">Вход в личный кабинет</h2>

    <form id="loginForm">

        <label>Ваш email:</label>
        <input type="email" id="email" required placeholder="pochta@mail.ru">

        <label>Пароль:</label>
        <input type="password" id="password" minlength="6" required placeholder="********">

        <button class="btn login" type="submit">Войти</button>

    </form>

    <div class="links">
        <a href="../pages/recoveryFirst.html">Забыли пароль?</a>
        <a href="../pages/registration.html">Регистрация</a>
    </div>

</div>

<script src="../scripts/loginRegistration.js"></script>

</body>
</html>
