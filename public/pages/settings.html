<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamUp - Настройки</title>
<link rel="stylesheet" href="../styles/feed.css">
</head>
<body class="edit-body">

   <div class="container">
        <!-- Плавающие меню -->
       <aside class="sidebar">
       
           <h1 class="logo">TeamUP</h1>
           <button id="feed-page" class="menu-btn feed" type="submit">
               <img src="../images/feedImage.png" alt="Лента">
               <span>Лента</span>
           </button>
            <button id="chats-page" class="menu-btn">
                <img src="../images/achievements.png" alt="Чаты">
                <span>Мои чаты</span>
            </button>
            <button id="rating-page" class="menu-btn">
                <img src="../images/rating.png" alt="Рейтинг">
                <span>Рейтинг игроков</span>
            </button>
            <button id="resp-page" class="menu-btn">
                <img src="../images/response.png" alt="Отклики">
                <span>Отклики</span>
            </button>
            <button id="profile-page" class="menu-btn active">
                <img src="../images/profile.png" alt="Профиль">
                <span>Профиль</span>
            </button>

            <!-- Скрытое меню аккаунта -->
            <div class="account-box hidden">
                <button class="account-btn" id="hiddenEdit">Настройки</button>
                <hr class="separator-line">
                <button class="account-btn" id="logOutBtn">Выход из аккаунта</button>
            </div>
            
            <!-- Раздел аккаунта -->
            <div class="user">
                <div class="avatar" id="userAvatar">H</div>
                <span id="userNickName">Ник пользователя</span>
                <button class="open-settings-btn"></button>
            </div>
       
       </aside>
       

       <!-- Контейнер основного контента -->
       <main class="main">
          <h2 class="edit-header">Настройки профиля</h2>
          <label class="edit-text">Ник пользователя</label>
          <input class="edit-name" type="text" id="newUserName" placeholder="Введите ник">
          <label class="edit-text">Описание</label>
          <textarea class="edit-desc" id="newBio" placeholder="О себе" maxlength="150"></textarea>
          <button class="profile-save" id="editSave">
              <img src="../images/save.png" alt="Сохранить">
              <span>Сохранить</span>
          </button>
       </main>
       
    </div>

<script src="../scripts/profileEdit.js"></script>

</body>
</html>
