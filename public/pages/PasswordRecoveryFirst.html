<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamUp</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">TeamUP</h1>
        <h2 class="title">Восстановление пароля</h2>
        <form id="PRFormFirst">
            <label>Ваш email:</label>
            <input type="email" id="email" placeholder="Введите email" />
            
            <button type="submit" id="btn-email">Отправить код:</button>
            
            <label>Код подтверждения:</label>
            <input type="text" id="code" required placeholder="" disabled/>
            
            <button type="submit" id="btn-code" disabled>Подтвердить</button>
        </form>
    </div>
</body>
<script src="../scripts/Transition.js"></script>
</html>
