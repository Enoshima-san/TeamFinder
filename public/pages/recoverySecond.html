<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamUp</title>
    <link rel="stylesheet" href="../styles/loginRegistration.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">TeamUP</h1>
        <h2 class="title">Восстановление пароля</h2>
        <form id="recoverySecond">
            <label>Ваш email:</label>
            <input type="email" id="email" required placeholder="pochta@mail.ru">
            <label>Новый пароль:</label>
            <input type="password" id="password" minlength="6" required placeholder="Введите новый пароль" />

            <label>Подтверждение пароля:</label>
            <input type="password" id="passwordAgain" minlength="6" required placeholder="Введите новый пароль повторно" />

            <button type="submit" class="btn save">Сохранить</button>
        </form>
        <div class="links">
        <a href="../pages/login.html">Вход</a>
        </div>
    </div>
</body>
<script src="../scripts/recovery.js"></script>
</html>
